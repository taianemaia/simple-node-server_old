name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: 
      - "main"
      - "al/**"
      - "feature/**"
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This job is called "Explore-Github-Actions"
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
  
# TODO: Part 1 
# - Create a job for "build" (building project)
# - Create a job for "test" (running unit tests)
# - Ensure the "test" only runs if the "build" step is successful.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test


# TODO: Part 2 
# - Create a job for deploying the project to DockerHub.
# - Create a job for deploying the project to Render only if the DockerHub deploy is successful.
  deploy-to-docker:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/al/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: taianemaia/simple-node-server:latest

  deploy-to-render:
    needs: deploy-to-docker
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/al/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Step 1: Get the Render service ID (creates the service if it doesn't exist yet)
      - name: Get or create Render service
        id: render-service
        run: |
          chmod +x ./scripts/render-get-service-id.sh
          IMAGE_PATH="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/simple-node-server:latest"
          SERVICE_ID=$(./scripts/render-get-service-id.sh simple-node-server "$IMAGE_PATH")
          echo "service_id=$SERVICE_ID" >> $GITHUB_OUTPUT
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

      # Step 2: Trigger a new deployment on Render using the service ID from Step 1
      - name: Trigger Render deploy
        run: |
          curl -f -X POST \
            "https://api.render.com/v1/services/${{ steps.render-service.outputs.service_id }}/deploys" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
